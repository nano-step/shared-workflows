name: Publish Stable (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: "npm package name (e.g. nano-brain or @kokorolx/ai-sandbox-wrapper)"
        type: string
        required: true
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      build-command:
        description: "Optional build command to run before publish (e.g. npm run build:web). Leave empty to skip."
        type: string
        default: ""
      changelog-insert-marker:
        description: "String after which new CHANGELOG entries are inserted"
        type: string
        default: "All notable changes to this project will be documented in this file."
    secrets:
      NPM_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://registry.npmjs.org"

      # ── 1. Bot guard — prevent infinite loop from our own commits ────────────
      - name: Check if bot commit (guard)
        id: guard
        run: |
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          echo "Author: $COMMIT_AUTHOR"
          echo "Message: $COMMIT_MSG"
          if [[ "$COMMIT_AUTHOR" == "github-actions[bot]" ]] || \
             echo "$COMMIT_MSG" | grep -q "\[skip ci\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Bot commit detected — skipping publish"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: npm ci --ignore-scripts

      - name: Run build command
        if: steps.guard.outputs.skip == 'false' && inputs.build-command != ''
        run: ${{ inputs.build-command }}

      # ── 2. Detect semver bump from conventional commits ──────────────────────
      - name: Detect semver bump
        if: steps.guard.outputs.skip == 'false'
        id: bump
        run: |
          # Find last stable tag (exclude beta tags)
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname \
            | grep -v 'beta' | head -1 || echo "")
          echo "Last stable tag: ${LAST_TAG:-none}"

          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s%n%b" --no-merges)

          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|chore|docs|style|test|perf|ci)(\(.+\))?!:" || \
             echo "$COMMITS" | grep -q "^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT
          echo "range=${RANGE}" >> $GITHUB_OUTPUT
          echo "Detected bump: $BUMP"

      # ── 3. Bump version in package.json ─────────────────────────────────────
      - name: Bump version
        if: steps.guard.outputs.skip == 'false'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version)
          VERSION="${NEW_VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      # ── 4. Generate categorised changelog ───────────────────────────────────
      - name: Generate changelog
        if: steps.guard.outputs.skip == 'false'
        id: changelog
        run: |
          RANGE="${{ steps.bump.outputs.range }}"

          breaking=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^(feat|fix|refactor|chore|docs|style|test|perf|ci)(\(.+\))?!:" \
            | sed 's/^/- /' || true)
          feat=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^feat(\(.+\))?:" | grep -v "!" | sed 's/^/- /' || true)
          fix=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^fix(\(.+\))?:" | sed 's/^/- /' || true)
          refactor=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^refactor(\(.+\))?:" | sed 's/^/- /' || true)
          docs=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^docs(\(.+\))?:" | sed 's/^/- /' || true)
          chore=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^chore(\(.+\))?:" \
            | grep -v "bump version" \
            | grep -v "update CHANGELOG" \
            | grep -v "\[skip ci\]" \
            | sed 's/^/- /' || true)

          body=""
          [ -n "$breaking" ] && body+=$'### ⚠ Breaking Changes\n'"$breaking"$'\n\n'
          [ -n "$feat" ]     && body+=$'### Added\n'"$feat"$'\n\n'
          [ -n "$fix" ]      && body+=$'### Fixed\n'"$fix"$'\n\n'
          [ -n "$refactor" ] && body+=$'### Changed\n'"$refactor"$'\n\n'
          [ -n "$docs" ]     && body+=$'### Documentation\n'"$docs"$'\n\n'
          [ -n "$chore" ]    && body+=$'### Other\n'"$chore"$'\n\n'
          [ -z "$body" ]     && body="_No notable changes_"

          echo "$body" > /tmp/changelog_body.md

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 5. Update CHANGELOG.md ───────────────────────────────────────────────
      - name: Update CHANGELOG.md
        if: steps.guard.outputs.skip == 'false'
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import date

          version = os.environ['VERSION']
          marker = os.environ['MARKER']
          today = date.today().strftime('%Y-%m-%d')
          pkg_name = os.environ['PKG_NAME']

          with open('/tmp/changelog_body.md') as f:
              body = f.read().strip()

          install_line = f"**Install:** `npm install {pkg_name}@{version}`"
          new_entry = f"## [{version}] — {today}\n\n{body}\n\n{install_line}\n\n---\n\n"

          with open('CHANGELOG.md') as f:
              content = f.read()

          idx = content.find(marker)
          if idx != -1:
              insert_pos = idx + len(marker)
              # Skip past any trailing newlines after the marker
              while insert_pos < len(content) and content[insert_pos] in ('\n', '\r'):
                  insert_pos += 1
              content = content[:insert_pos] + '\n' + new_entry + content[insert_pos:]
          else:
              # Marker not found — prepend to file
              content = new_entry + content

          with open('CHANGELOG.md', 'w') as f:
              f.write(content)

          print(f"CHANGELOG.md updated for v{version}")
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MARKER: ${{ inputs.changelog-insert-marker }}
          PKG_NAME: ${{ inputs.package-name }}

      # ── 6. Commit package.json + CHANGELOG, create tag, push ────────────────
      - name: Commit version bump and push tag
        if: steps.guard.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD --follow-tags

      # ── 7. Publish to npm @latest ────────────────────────────────────────────
      - name: Publish to npm @latest
        if: steps.guard.outputs.skip == 'false'
        run: npm publish --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 8. Create GitHub release ─────────────────────────────────────────────
      - name: Create GitHub release
        if: steps.guard.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const pkgName = '${{ inputs.package-name }}';
            const body = `${{ steps.changelog.outputs.body }}`;
            const tag = `v${version}`;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Release ${tag} already exists — skipping`);
            } catch (e) {
              if (e.status !== 404) throw e;
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `${pkgName} v${version}`,
                body: `${body}\n\n---\n\n**Install:** \`npm install ${pkgName}@latest\``,
                prerelease: false,
                target_commitish: context.sha,
              });
              console.log(`Release ${tag} created`);
            }
