name: Publish Beta (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: "npm package name (e.g. nano-brain or @kokorolx/ai-sandbox-wrapper)"
        type: string
        required: true
      beta-branch:
        description: "Branch that triggers beta publish"
        type: string
        default: beta
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      build-command:
        description: "Optional build command to run before publish (e.g. npm run build:web). Leave empty to skip."
        type: string
        default: ""
    secrets:
      NPM_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run build command
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Compute beta version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version")
          BETA="${BASE}-beta.${{ github.run_number }}"
          echo "beta=$BETA" >> $GITHUB_OUTPUT
          echo "Beta version: $BETA"

      - name: Set beta version (no git tag)
        run: npm version ${{ steps.version.outputs.beta }} --no-git-tag-version

      - name: Publish to npm @beta
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog since last tag
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi
          COMMITS=$(git log $RANGE --pretty=format:"- %s" \
            --no-merges \
            | grep -v "^- chore: bump version" \
            | grep -v "^- chore: update CHANGELOG" \
            || true)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub pre-release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.beta }}';
            const pkgName = '${{ inputs.package-name }}';
            const changelog = `${{ steps.changelog.outputs.changelog }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `${pkgName} v${version} (beta)`,
              body: `## Changes\n\n${changelog || '_No notable changes_'}\n\n---\n\n**Install:** \`npm install ${pkgName}@beta\``,
              prerelease: true,
              target_commitish: context.sha,
            });
